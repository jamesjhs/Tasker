<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tasker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">Loading Tasker…</p>
      <p id="loading-status" class="loading-status">Starting…</p>
      <p id="loading-error" class="loading-error" hidden></p>
      <div id="loading-actions" class="loading-actions" hidden>
        <button class="btn btn-primary" id="loading-retry-btn">Retry</button>
        <button class="btn btn-secondary" id="loading-login-btn">Open Tasker</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
