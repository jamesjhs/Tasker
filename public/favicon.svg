  <!-- Clipboard body -->
  <rect x="14" y="18" width="36" height="38" rx="4" ry="4" fill="#ffffff"/>
  <!-- Clipboard clip -->
  <rect x="24" y="13" width="16" height="10" rx="3" ry="3" fill="#c7d9fb"/>
  <rect x="27" y="11" width="10" height="6" rx="2" ry="2" fill="#ffffff"/>
  <!-- Tick mark inside clipboard -->
  <polyline points="22,37 28,43 42,29" fill="none" stroke="#1a56db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
