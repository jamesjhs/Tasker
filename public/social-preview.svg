    <path d="M48 21C32.536 21 20 33.536 20 49C20 64.464 32.536 77 48 77C63.464 77 76 64.464 76 49C76 33.536 63.464 21 48 21ZM48 33C56.837 33 64 40.163 64 49C64 57.837 56.837 65 48 65C39.163 65 32 57.837 32 49C32 40.163 39.163 33 48 33Z" fill="white"/>
