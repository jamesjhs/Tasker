  <text x="232" y="152" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" letter-spacing="-1.8">Tasker</text>
  <text x="232" y="212" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="2.8">ANONYMOUS WORKLOAD LOGGER FOR HEALTHCARE TEAMS</text>
  <text x="112" y="306" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Self-hosted. Privacy-first. Built for operational evidence.</text>
  <text x="112" y="366" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28">Track tasks, interruptions, backlog pressure, analytics, and exports</text>
  <text x="112" y="406" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28">without storing patient data, real names, or vendor-hosted cloud records.</text>
  <g transform="translate(112 470)">
    <rect width="215" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.14" stroke="rgba(255,255,255,0.14)"/>
    <text x="28" y="37" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Self-hosted</text>
    <rect x="236" width="266" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.14" stroke="rgba(255,255,255,0.14)"/>
    <text x="264" y="37" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Anonymous by design</text>
    <rect x="523" width="255" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.14" stroke="rgba(255,255,255,0.14)"/>
    <text x="551" y="37" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">30-day retention</text>
    <rect x="799" width="216" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.14" stroke="rgba(255,255,255,0.14)"/>
    <text x="827" y="37" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">PWA + exports</text>
