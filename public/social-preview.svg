      <stop stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <circle cx="1048" cy="104" r="136" fill="#93C5FD" opacity="0.14"/>
  <circle cx="153" cy="548" r="172" fill="#60A5FA" opacity="0.10"/>
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
