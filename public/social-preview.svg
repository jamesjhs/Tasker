<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tasker social preview</title>
  <desc id="desc">Tasker is a self-hosted anonymous workload logger for healthcare teams.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="54" x2="1114" y2="588" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
